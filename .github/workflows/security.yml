name: Security Review

permissions:
  pull-requests: write   
  contents: read
  security-events: write

on:
  push:
    branches: [main, master]
  pull_request:
  schedule:
    - cron: '0 2 * * 1'
  workflow_dispatch:

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 2

      
      - name: Claude Security Review
        id: claude-scan
        uses: anthropics/claude-code-security-review@main
        with:
          comment-pr: ${{ github.event_name == 'pull_request' }}
          upload-results: true
          claude-api-key: ${{ secrets.CLAUDE_API_KEY }}

      - name: Convert findings to SARIF
        if: always()
        run: |
          RESULTS="${{ steps.claude-scan.outputs.results-file }}"
          if [ -f "$RESULTS" ]; then
            python .github/convert_to_sarif.py "$RESULTS" security-results.sarif
          else
            echo '{"version":"2.1.0","$schema":"https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/Schemata/sarif-schema-2.1.0.json","runs":[{"tool":{"driver":{"name":"claude-code-security-review","rules":[]}},"results":[]}]}' > security-results.sarif
            echo "No findings file, created empty SARIF"
          fi

      - name: Upload SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: security-results.sarif
          category: claude-security-review
